let currentList = [...words];
let index = 0;
let flipped = false;
let errors = {};

function generateExample(word) {
  return "Παράδειγμα: " + word + " είναι καλό.";
}

function show() {
  let w = currentList[index];
  document.getElementById("word").innerText = flipped ? w.ru : w.gr;
  document.getElementById("meta").innerText = w.cat;
  document.getElementById("example").innerText = generateExample(w.gr);
}

function flipCard() {
  flipped = !flipped;
  show();
}

function nextWord() {
  index = Math.floor(Math.random() * currentList.length);
  flipped = false;
  document.getElementById("result").innerText="";
  document.getElementById("answer").value="";
  show();
}

function check() {
  let w = currentList[index];
  let input = document.getElementById("answer").value.toLowerCase();
  if(input === w.ru.toLowerCase()) {
    document.getElementById("result").innerText="✅";
  } else {
    document.getElementById("result").innerText="❌ "+w.ru;
    errors[w.cat] = (errors[w.cat]||0)+1;
  }
}

function speak() {
  let w = currentList[index];
  let u = new SpeechSynthesisUtterance(w.gr);
  u.lang="el-GR";
  speechSynthesis.cancel();
  speechSynthesis.speak(u);
}

function weakMode() {
  let sorted = Object.entries(errors).sort((a,b)=>b[1]-a[1]);
  let weak = sorted.slice(0,3).map(x=>x[0]);
  currentList = words.filter(w=>weak.includes(w.cat));
  nextWord();
}

function normalMode() {
  currentList = [...words];
  nextWord();
}
